name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build-and-smoke:
    name: Build and smoke-test (${{ matrix.variant }}, ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            variant: standard
          - arch: aarch64
            runner: ubuntu-24.04-arm
            variant: standard
          - arch: x86_64
            runner: ubuntu-24.04
            variant: glx-llvmpipe
          - arch: aarch64
            runner: ubuntu-24.04-arm
            variant: glx-llvmpipe
          - arch: x86_64
            runner: ubuntu-24.04
            variant: glx-external-vulkan
          - arch: aarch64
            runner: ubuntu-24.04-arm
            variant: glx-external-vulkan
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - if: matrix.variant == 'standard'
        run: ./build.sh "${{ matrix.arch }}"
        env:
          CACHIX_CACHE_NAME: xvfb-static
          CACHIX_AUTH_TOKEN: ${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}
          CACHIX_SIGNING_KEY: ${{ github.event_name != 'pull_request' && secrets.CACHIX_SIGNING_KEY || '' }}
      - if: matrix.variant == 'standard'
        run: ./test/smoke.sh "out/${{ matrix.arch }}/xvfb-static-linux-${{ matrix.arch }}.tar.gz"
      - if: matrix.variant == 'standard'
        run: ./test/integration.sh "${{ matrix.arch }}"
        env:
          CACHIX_CACHE_NAME: xvfb-static
          CACHIX_AUTH_TOKEN: ${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}
          CACHIX_SIGNING_KEY: ${{ github.event_name != 'pull_request' && secrets.CACHIX_SIGNING_KEY || '' }}
      - if: matrix.variant == 'glx-llvmpipe'
        name: Build GLX llvmpipe alpha archive
        env:
          CACHIX_CACHE_NAME: xvfb-static
          CACHIX_AUTH_TOKEN: ${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}
          CACHIX_SIGNING_KEY: ${{ github.event_name != 'pull_request' && secrets.CACHIX_SIGNING_KEY || '' }}
        run: ./build-glx-llvmpipe.sh "${{ matrix.arch }}"
      - if: matrix.variant == 'glx-llvmpipe'
        name: Build GLX render test
        env:
          CACHIX_CACHE_NAME: xvfb-static
          CACHIX_AUTH_TOKEN: ${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}
          CACHIX_SIGNING_KEY: ${{ github.event_name != 'pull_request' && secrets.CACHIX_SIGNING_KEY || '' }}
        run: |
          docker run --rm \
            -e NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM=1 \
            -e CACHIX_CACHE_NAME -e CACHIX_AUTH_TOKEN -e CACHIX_SIGNING_KEY \
            -v "$PWD":/src -w /src \
            -v xvfb-static-nix:/nix \
            nixos/nix@sha256:22c0a3a816eb3d315eb6720d2a58a3c3b622c9717c578f3c80b687668c6da277 \
            sh -eu -c '
              git config --global --add safe.directory /src
              bash /src/nix-build-cached.sh nix \
                --extra-experimental-features "nix-command flakes" build \
                --impure --file /src/test/glx-render.nix \
                --out-link /tmp/result-glx-render-test --option log-lines 200
              test -x /tmp/result-glx-render-test/bin/glx-render-test
              rm -rf /src/result-glx-render-test
              mkdir -p /src/result-glx-render-test/bin
              install -m 0755 /tmp/result-glx-render-test/bin/glx-render-test \
                /src/result-glx-render-test/bin/glx-render-test
            '
          test -x result-glx-render-test/bin/glx-render-test
      - if: matrix.variant == 'glx-llvmpipe'
        name: Smoke-test GLX llvmpipe alpha archive
        run: ./test/smoke.sh "out/glx-llvmpipe-alpha/${{ matrix.arch }}/xvfb-static-glx-llvmpipe-alpha-linux-${{ matrix.arch }}.tar.gz"
      - if: matrix.variant == 'glx-llvmpipe'
        name: Render with packaged GLX llvmpipe alpha in Alpine
        run: ./test/glx-llvmpipe-smoke.sh "out/glx-llvmpipe-alpha/${{ matrix.arch }}/xvfb-static-glx-llvmpipe-alpha-linux-${{ matrix.arch }}.tar.gz"
      - if: matrix.variant == 'glx-external-vulkan'
        name: Build GLX external Vulkan alpha archive
        env:
          CACHIX_CACHE_NAME: xvfb-static
          CACHIX_AUTH_TOKEN: ${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}
          CACHIX_SIGNING_KEY: ${{ github.event_name != 'pull_request' && secrets.CACHIX_SIGNING_KEY || '' }}
        run: ./build-glx-external-vulkan.sh "${{ matrix.arch }}"
      - if: matrix.variant == 'glx-external-vulkan'
        name: Build GLX render test
        env:
          CACHIX_CACHE_NAME: xvfb-static
          CACHIX_AUTH_TOKEN: ${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}
          CACHIX_SIGNING_KEY: ${{ github.event_name != 'pull_request' && secrets.CACHIX_SIGNING_KEY || '' }}
        run: |
          docker run --rm \
            -e NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM=1 \
            -e CACHIX_CACHE_NAME -e CACHIX_AUTH_TOKEN -e CACHIX_SIGNING_KEY \
            -v "$PWD":/src -w /src \
            -v xvfb-static-nix:/nix \
            nixos/nix@sha256:22c0a3a816eb3d315eb6720d2a58a3c3b622c9717c578f3c80b687668c6da277 \
            sh -eu -c '
              git config --global --add safe.directory /src
              bash /src/nix-build-cached.sh nix \
                --extra-experimental-features "nix-command flakes" build \
                --impure --file /src/test/glx-render.nix \
                --out-link /tmp/result-glx-render-test --option log-lines 200
              test -x /tmp/result-glx-render-test/bin/glx-render-test
              rm -rf /src/result-glx-render-test
              mkdir -p /src/result-glx-render-test/bin
              install -m 0755 /tmp/result-glx-render-test/bin/glx-render-test \
                /src/result-glx-render-test/bin/glx-render-test
            '
          test -x result-glx-render-test/bin/glx-render-test
      - if: matrix.variant == 'glx-external-vulkan'
        name: Smoke-test GLX external Vulkan alpha archive
        run: ./test/glx-external-vulkan-smoke.sh "out/glx-external-vulkan-alpha/${{ matrix.arch }}/xvfb-static-glx-external-vulkan-alpha-linux-${{ matrix.arch }}.tar.gz"
      - uses: actions/upload-artifact@v7
        if: matrix.variant == 'standard'
        with:
          name: xvfb-static-linux-${{ matrix.arch }}
          path: |
            out/${{ matrix.arch }}/xvfb-static-linux-${{ matrix.arch }}.tar.gz
            out/${{ matrix.arch }}/SHA256SUMS
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        if: matrix.variant == 'glx-llvmpipe'
        with:
          name: xvfb-static-glx-llvmpipe-alpha-linux-${{ matrix.arch }}
          path: |
            out/glx-llvmpipe-alpha/${{ matrix.arch }}/xvfb-static-glx-llvmpipe-alpha-linux-${{ matrix.arch }}.tar.gz
            out/glx-llvmpipe-alpha/${{ matrix.arch }}/SHA256SUMS
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        if: matrix.variant == 'glx-external-vulkan'
        with:
          name: xvfb-static-glx-external-vulkan-alpha-linux-${{ matrix.arch }}
          path: |
            out/glx-external-vulkan-alpha/${{ matrix.arch }}/xvfb-static-glx-external-vulkan-alpha-linux-${{ matrix.arch }}.tar.gz
            out/glx-external-vulkan-alpha/${{ matrix.arch }}/SHA256SUMS
          if-no-files-found: error

  build-success:
    name: build-success
    if: always()
    needs: build-and-smoke
    runs-on: ubuntu-24.04
    steps:
      - name: Require every build and test to pass
        run: test "${{ needs.build-and-smoke.result }}" = success

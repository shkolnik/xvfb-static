name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build-and-smoke:
    name: Build and smoke-test (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - run: ./build.sh "${{ matrix.arch }}"
        env:
          CACHIX_CACHE_NAME: xvfb-static
          CACHIX_AUTH_TOKEN: ${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}
          CACHIX_SIGNING_KEY: ${{ github.event_name != 'pull_request' && secrets.CACHIX_SIGNING_KEY || '' }}
      - run: ./test/smoke.sh "out/${{ matrix.arch }}/xvfb-static-linux-${{ matrix.arch }}.tar.gz"
      - run: ./test/integration.sh "${{ matrix.arch }}"
        env:
          CACHIX_CACHE_NAME: xvfb-static
          CACHIX_AUTH_TOKEN: ${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}
          CACHIX_SIGNING_KEY: ${{ github.event_name != 'pull_request' && secrets.CACHIX_SIGNING_KEY || '' }}
      - uses: actions/upload-artifact@v7
        with:
          name: xvfb-static-linux-${{ matrix.arch }}
          path: |
            out/${{ matrix.arch }}/xvfb-static-linux-${{ matrix.arch }}.tar.gz
            out/${{ matrix.arch }}/SHA256SUMS
          if-no-files-found: error

name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build-and-smoke:
    name: Build and smoke-test (${{ matrix.variant }}, ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            variant: standard
          - arch: aarch64
            runner: ubuntu-24.04-arm
            variant: standard
          - arch: x86_64
            runner: ubuntu-24.04
            variant: glx
          - arch: aarch64
            runner: ubuntu-24.04-arm
            variant: glx
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - if: matrix.variant == 'standard'
        run: ./build.sh "${{ matrix.arch }}"
        env:
          CACHIX_CACHE_NAME: xvfb-static
          CACHIX_AUTH_TOKEN: ${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}
          CACHIX_SIGNING_KEY: ${{ github.event_name != 'pull_request' && secrets.CACHIX_SIGNING_KEY || '' }}
      - if: matrix.variant == 'standard'
        run: ./test/smoke.sh "out/${{ matrix.arch }}/xvfb-static-linux-${{ matrix.arch }}.tar.gz"
      - if: matrix.variant == 'glx'
        name: Build GLX server and render test
        env:
          CACHIX_CACHE_NAME: xvfb-static
          CACHIX_AUTH_TOKEN: ${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}
          CACHIX_SIGNING_KEY: ${{ github.event_name != 'pull_request' && secrets.CACHIX_SIGNING_KEY || '' }}
        run: |
          docker run --rm \
            -e NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM=1 \
            -e CACHIX_CACHE_NAME -e CACHIX_AUTH_TOKEN -e CACHIX_SIGNING_KEY \
            -v "$PWD":/src -w /src \
            -v xvfb-static-nix:/nix \
            nixos/nix@sha256:377d4887aca98f0dfa12971c1ea6d6a625a435d8b610d4c95a436843da6fbfd1 \
            /src/nix-build-cached.sh sh -eu -c '
              git config --global --add safe.directory /src
              nix --extra-experimental-features "nix-command flakes" build \
                --impure --file /src/package-glx.nix \
                --out-link /src/result-glx --print-build-logs
              nix --extra-experimental-features "nix-command flakes" build \
                --impure --file /src/test/glx-render.nix \
                --out-link /src/result-glx-render-test --print-build-logs
            '
      - if: matrix.variant == 'glx'
        name: Render with llvmpipe in Alpine
        run: |
          docker run --rm \
            -e GALLIUM_DRIVER=llvmpipe \
            -v "$PWD":/src:ro \
            -v xvfb-static-nix:/nix \
            alpine:3.22 sh -eu -c '
              /src/result-glx/bin/Xvfb :99 +iglx -screen 0 64x64x24 \
                >/tmp/xvfb.log 2>&1 &
              pid=$!
              trap "kill $pid 2>/dev/null || true" EXIT
              sleep 1
              DISPLAY=:99 /src/result-glx-render-test/bin/glx-render-test
              test ! -s /tmp/xvfb.log
              kill "$pid"
              wait "$pid" || true
              trap - EXIT
            '
      - uses: actions/upload-artifact@v7
        if: matrix.variant == 'standard'
        with:
          name: xvfb-static-linux-${{ matrix.arch }}
          path: |
            out/${{ matrix.arch }}/xvfb-static-linux-${{ matrix.arch }}.tar.gz
            out/${{ matrix.arch }}/SHA256SUMS
          if-no-files-found: error

name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build-and-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: ./build.sh x86_64
      - run: ./test/smoke.sh out/x86_64/static-xvfb-linux-x86_64.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: static-xvfb-linux-x86_64
          path: |
            out/x86_64/static-xvfb-linux-x86_64.tar.gz
            out/x86_64/SHA256SUMS
          if-no-files-found: error

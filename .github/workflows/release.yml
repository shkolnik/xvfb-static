name: Release

on:
  push:
    tags:
      - "v*.*.*-r*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}

jobs:
  build-and-smoke:
    name: Build and smoke-test (${{ matrix.variant }}, ${{ matrix.arch }})
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            variant: standard
            artifact: xvfb-static-linux-x86_64
            archive: out/x86_64/xvfb-static-linux-x86_64.tar.gz
          - arch: aarch64
            runner: ubuntu-24.04-arm
            variant: standard
            artifact: xvfb-static-linux-aarch64
            archive: out/aarch64/xvfb-static-linux-aarch64.tar.gz
          - arch: x86_64
            runner: ubuntu-24.04
            variant: glx-llvmpipe
            artifact: xvfb-static-glx-llvmpipe-alpha-linux-x86_64
            archive: out/glx-llvmpipe-alpha/x86_64/xvfb-static-glx-llvmpipe-alpha-linux-x86_64.tar.gz
          - arch: aarch64
            runner: ubuntu-24.04-arm
            variant: glx-llvmpipe
            artifact: xvfb-static-glx-llvmpipe-alpha-linux-aarch64
            archive: out/glx-llvmpipe-alpha/aarch64/xvfb-static-glx-llvmpipe-alpha-linux-aarch64.tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - if: matrix.variant == 'standard'
        run: ./build.sh "${{ matrix.arch }}"
        env:
          CACHIX_CACHE_NAME: xvfb-static
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_SIGNING_KEY: ${{ secrets.CACHIX_SIGNING_KEY }}
      - if: matrix.variant == 'glx-llvmpipe'
        run: ./build-glx-llvmpipe.sh "${{ matrix.arch }}"
        env:
          CACHIX_CACHE_NAME: xvfb-static
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_SIGNING_KEY: ${{ secrets.CACHIX_SIGNING_KEY }}
      - if: matrix.variant == 'standard'
        run: ./test/integration.sh "${{ matrix.arch }}"
        env:
          CACHIX_CACHE_NAME: xvfb-static
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_SIGNING_KEY: ${{ secrets.CACHIX_SIGNING_KEY }}
      - if: matrix.variant == 'glx-llvmpipe'
        name: Build GLX render test
        env:
          CACHIX_CACHE_NAME: xvfb-static
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
          CACHIX_SIGNING_KEY: ${{ secrets.CACHIX_SIGNING_KEY }}
        run: |
          docker run --rm \
            -e NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM=1 \
            -e CACHIX_CACHE_NAME -e CACHIX_AUTH_TOKEN -e CACHIX_SIGNING_KEY \
            -v "$PWD":/src -w /src \
            -v xvfb-static-nix:/nix \
            nixos/nix@sha256:377d4887aca98f0dfa12971c1ea6d6a625a435d8b610d4c95a436843da6fbfd1 \
            sh -eu -c '
              git config --global --add safe.directory /src
              /src/nix-build-cached.sh nix \
                --extra-experimental-features "nix-command flakes" build \
                --impure --file /src/test/glx-render.nix \
                --out-link /tmp/result-glx-render-test --option log-lines 200
              test -x /tmp/result-glx-render-test/bin/glx-render-test
              rm -rf /src/result-glx-render-test
              mkdir -p /src/result-glx-render-test/bin
              install -m 0755 /tmp/result-glx-render-test/bin/glx-render-test \
                /src/result-glx-render-test/bin/glx-render-test
            '
          test -x result-glx-render-test/bin/glx-render-test
      - run: ./test/smoke.sh "${{ matrix.archive }}"
      - if: matrix.variant == 'glx-llvmpipe'
        run: ./test/glx-llvmpipe-smoke.sh "${{ matrix.archive }}"
      - name: Attest release archive
        uses: actions/attest@v4
        with:
          subject-path: ${{ matrix.archive }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build-and-smoke
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: xvfb-static-*
          path: dist
          merge-multiple: true
      - name: Validate version and assemble release
        shell: bash
        run: |
          set -euo pipefail

          tag="$GITHUB_REF_NAME"
          if [[ ! "$tag" =~ ^v([0-9]+(\.[0-9]+)*)-r([1-9][0-9]*)$ ]]; then
            echo "invalid release tag: $tag" >&2
            echo "expected v<upstream-xorg-version>-r<positive-revision>" >&2
            exit 1
          fi
          upstream_version="${BASH_REMATCH[1]}"
          release_version="${tag#v}"

          for arch in x86_64 aarch64; do
            archive="dist/xvfb-static-linux-$arch.tar.gz"
            test -s "$archive"
            manifest="$(tar -xOf "$archive" share/xvfb-static/manifest.json)"
            manifest_release="$(jq -er '.version' <<<"$manifest")"
            manifest_upstream="$(jq -er '.components["xorg-server"]' <<<"$manifest")"
            if [[ "$manifest_release" != "$release_version" ]]; then
              echo "$archive declares release $manifest_release, but tag $tag declares $release_version" >&2
              exit 1
            fi
            if [[ "$manifest_upstream" != "$upstream_version" ]]; then
              echo "$archive contains X.Org Server $manifest_upstream, but tag $tag declares $upstream_version" >&2
              exit 1
            fi

            llvmpipe_archive="dist/xvfb-static-glx-llvmpipe-alpha-linux-$arch.tar.gz"
            test -s "$llvmpipe_archive"
            llvmpipe_manifest="$(tar -xOf "$llvmpipe_archive" share/xvfb-static/manifest.json)"
            llvmpipe_release="$(jq -er '.version' <<<"$llvmpipe_manifest")"
            llvmpipe_upstream="$(jq -er '.components["xorg-server"]' <<<"$llvmpipe_manifest")"
            jq -e '.variant == "glx" and .maturity == "alpha" and .renderer == "llvmpipe"' \
              <<<"$llvmpipe_manifest" >/dev/null
            if [[ "$llvmpipe_release" != "$release_version" ]]; then
              echo "$llvmpipe_archive declares release $llvmpipe_release, but tag $tag declares $release_version" >&2
              exit 1
            fi
            if [[ "$llvmpipe_upstream" != "$upstream_version" ]]; then
              echo "$llvmpipe_archive contains X.Org Server $llvmpipe_upstream, but tag $tag declares $upstream_version" >&2
              exit 1
            fi
          done

          (
            cd dist
            sha256sum \
              xvfb-static-linux-x86_64.tar.gz \
              xvfb-static-linux-aarch64.tar.gz \
              xvfb-static-glx-llvmpipe-alpha-linux-x86_64.tar.gz \
              xvfb-static-glx-llvmpipe-alpha-linux-aarch64.tar.gz > SHA256SUMS
          )

          nixpkgs_revision="$(jq -er '.nodes.nixpkgs.locked.rev' flake.lock)"
          {
            printf 'xvfb-static %s packages X.Org Server %s.\n\n' "$tag" "$upstream_version"
            printf -- '- x86_64: built and boot-tested on a native GitHub-hosted runner\n'
            printf -- '- aarch64: built and boot-tested on a native GitHub-hosted runner\n'
            printf -- '- standard and GLX llvmpipe alpha archives were built and tested for both architectures\n'
            printf -- '- GLX llvmpipe alpha uses Mesa llvmpipe software rendering and is experimental\n'
            printf -- '- all four archives have GitHub build-provenance attestations\n'
            printf -- '- nixpkgs revision: `%s`\n' "$nixpkgs_revision"
            printf -- '- source commit: `%s`\n\n' "$GITHUB_SHA"
            printf 'This build embeds 28 curated keyboard profiles. `us` is the default; select another at startup with `-keyboard PROFILE`. Arbitrary layouts and live switching are unsupported.\n'
          } > release-notes.md
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/xvfb-static-linux-x86_64.tar.gz \
            dist/xvfb-static-linux-aarch64.tar.gz \
            dist/xvfb-static-glx-llvmpipe-alpha-linux-x86_64.tar.gz \
            dist/xvfb-static-glx-llvmpipe-alpha-linux-aarch64.tar.gz \
            dist/SHA256SUMS \
            --verify-tag \
            --title "xvfb-static $GITHUB_REF_NAME" \
            --notes-file release-notes.md
